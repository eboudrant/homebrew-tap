name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update cask formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          ARM64_SHA="${{ github.event.client_payload.arm64_sha }}"
          X64_SHA="${{ github.event.client_payload.x64_sha }}"

          cat > Casks/papastud.rb << 'RUBY'
          cask "papastud" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              url "https://github.com/eboudrant/papa-stud/releases/download/v#{version}/PapaStud-darwin-arm64-#{version}.zip"
              sha256 "ARM64_SHA_PLACEHOLDER"
            end

            on_intel do
              url "https://github.com/eboudrant/papa-stud/releases/download/v#{version}/PapaStud-darwin-x64-#{version}.zip"
              sha256 "X64_SHA_PLACEHOLDER"
            end

            name "PapaStud"
            desc "Screenshot failure reviewer for Android testing tools"
            homepage "https://github.com/eboudrant/papa-stud"

            app "PapaStud.app"

            postflight do
              system_command "/usr/bin/xattr", args: ["-cr", "#{appdir}/PapaStud.app"]
            end

            zap trash: [
              "~/Library/Application Support/PapaStud",
            ]
          end
          RUBY

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Casks/papastud.rb
          sed -i "s/ARM64_SHA_PLACEHOLDER/$ARM64_SHA/g" Casks/papastud.rb
          sed -i "s/X64_SHA_PLACEHOLDER/$X64_SHA/g" Casks/papastud.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/papastud.rb
          git commit -m "Update papastud to v${{ github.event.client_payload.version }}"
          git push
